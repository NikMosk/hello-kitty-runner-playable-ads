<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hello Kitty Run — Playable Ad</title>
    <style>
        * { margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #ffc0cb, #ff69b4); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace; }
        #game-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; padding: 10px; }
        canvas { display: block; width: 100%; height: auto; cursor: pointer; border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 4px white; image-rendering: crisp-edges; image-rendering: pixelated; transition: filter 0.3s ease; }
        #score { position: absolute; top: 15px; left: 20px; color: white; font-size: 24px; font-weight: bold; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 8px 18px; border-radius: 40px; z-index: 10; pointer-events: none; font-family: 'Courier New', monospace; border: 2px solid white; }
        #timer { position: absolute; top: 15px; right: 20px; color: white; font-size: 24px; font-weight: bold; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 8px 18px; border-radius: 40px; z-index: 10; pointer-events: none; font-family: 'Courier New', monospace; border: 2px solid white; }
        .hint { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: auto; white-space: nowrap; text-align: center; color: white; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 8px 20px; border-radius: 40px; font-size: 12px; font-weight: bold; z-index: 10; pointer-events: none; font-family: 'Courier New', monospace; border: 2px solid white; }
        #endCard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 20; border-radius: 32px; text-align: center; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        #endCard h1 { font-size: 32px; margin-bottom: 15px; background: linear-gradient(135deg, #FFD700, #FF69B4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: none; }
        .final-score { font-size: 56px; font-weight: bold; color: #FFD700; margin: 10px 0; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        button { background: linear-gradient(135deg, #ff69b4, #ff1493); color: white; border: none; padding: 14px 40px; font-size: 18px; font-weight: bold; border-radius: 50px; margin-top: 25px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 8px 20px rgba(255,105,180,0.3); font-family: 'Courier New', monospace; }
        button:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="score">🎀 0</div>
    <div id="timer">⏱ 60</div>
    <div class="hint">✨ ТАПАЙ — HELLO KITTY ПРЫГАЕТ ✨</div>
    <div id="endCard">
        <h1>🎀 ИГРА ОКОНЧЕНА 🎀</h1>
        <p>Ты собрал(а)</p>
        <div class="final-score"><span id="finalScore">0</span> 🎀</div>
        <button id="installBtn">📲 СКАЧАТЬ ИГРУ</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    let score = 0;
    let gameActive = true;
    let gameEnded = false;
    
    let groundY = canvas.height - 80;
    let player = {
        x: 70, y: groundY - 50, width: 45, height: 55,
        velocityY: 0, isJumping: false
    };
    
    let obstacles = [], items = [];
    let frame = 0, spawnCounter = 0;
    const gravity = 0.8, jumpPower = -11;
    
    let gameSpeed = 4;
    let speedStartTime = Date.now();
    const speedRampUpDuration = 5000;
    const minSpeed = 4;
    const maxSpeed = 7;
    
    let gameStartTime = Date.now();
    const gameDuration = 60000;
    
    let particles = [];
    
    let firstSpawnDone = false;
    let spawnDelay = 30;
    
    let backgroundElements = [];
    
    // ========== МУЗЫКА ==========
    let bgMusic = null;
    let isMusicPlaying = false;
    let musicStarted = false;
    
    function initMusic() {
        if(bgMusic) return;
        bgMusic = new Audio('music.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.35;
    }
    
    function startMusic() {
        if(!gameActive || gameEnded) return;
        if(isMusicPlaying) return;
        initMusic();
        bgMusic.play().catch(e => console.log('Audio play error:', e));
        isMusicPlaying = true;
    }
    
    function stopMusic() {
        if(bgMusic) {
            bgMusic.pause();
            bgMusic.currentTime = 0;
        }
        isMusicPlaying = false;
    }
    
    function onFirstTap() {
        if(musicStarted) return;
        musicStarted = true;
        startMusic();
    }
    
    const crossTypes = [
        { width: 22, height: 22, visualY: groundY - 38, name: 'normal' },
        { width: 28, height: 28, visualY: groundY - 42, name: 'big' },
        { width: 22, height: 22, visualY: groundY - 38, name: 'double' }
    ];
    
    function createBuilding(x, isChurch) {
        if(isChurch) {
            return {
                x: x,
                type: 'church',
                width: 40,
                height: 35
            };
        } else {
            const buildingHeight = 65 + Math.floor(Math.random() * 3) * 12;
            const windowsLit = [];
            for(let i = 0; i < 12; i++) {
                windowsLit.push(Math.random() < 0.3);
            }
            return {
                x: x,
                type: 'building',
                width: 55,
                height: buildingHeight,
                windowsLit: windowsLit
            };
        }
    }
    
    function initBackground() {
        backgroundElements = [];
        for(let i = 0; i < 8; i++) {
            const isChurch = Math.random() < 0.05;
            backgroundElements.push(createBuilding(i * 110, isChurch));
        }
    }
    
    function getCyclicProgress() {
        if(!gameActive || gameEnded) return 0;
        const elapsed = (Date.now() - gameStartTime) / 1000;
        const cycleDuration = 60;
        let progress = (elapsed % cycleDuration) / cycleDuration;
        return progress;
    }
    
    function getCurrentSpeed() {
        if(!gameActive || gameEnded) return gameSpeed;
        const elapsed = Math.min(speedRampUpDuration, Date.now() - speedStartTime);
        const t = elapsed / speedRampUpDuration;
        return minSpeed + (maxSpeed - minSpeed) * t;
    }
    
    function interpolateColor(color1, color2, t) {
        const c1 = color1.match(/\d+/g).map(Number);
        const c2 = color2.match(/\d+/g).map(Number);
        return `rgb(${Math.floor(c1[0] + (c2[0] - c1[0]) * t)}, 
                   ${Math.floor(c1[1] + (c2[1] - c1[1]) * t)}, 
                   ${Math.floor(c1[2] + (c2[2] - c1[2]) * t)})`;
    }
    
    function getSkyGradient(progress) {
        let t1, t2, color1Top, color1Bottom, color2Top, color2Bottom;
        
        if(progress < 0.25) {
            t1 = 0; t2 = 0.25;
            color1Top = 'rgb(255, 120, 100)'; color1Bottom = 'rgb(255, 180, 150)';
            color2Top = 'rgb(135, 206, 235)'; color2Bottom = 'rgb(255, 248, 220)';
        } else if(progress < 0.5) {
            t1 = 0.25; t2 = 0.5;
            color1Top = 'rgb(135, 206, 235)'; color1Bottom = 'rgb(255, 248, 220)';
            color2Top = 'rgb(135, 135, 135)'; color2Bottom = 'rgb(255, 198, 120)';
        } else if(progress < 0.75) {
            t1 = 0.5; t2 = 0.75;
            color1Top = 'rgb(135, 135, 135)'; color1Bottom = 'rgb(255, 198, 120)';
            color2Top = 'rgb(25, 25, 50)'; color2Bottom = 'rgb(40, 40, 70)';
        } else {
            t1 = 0.75; t2 = 1.0;
            color1Top = 'rgb(25, 25, 50)'; color1Bottom = 'rgb(40, 40, 70)';
            color2Top = 'rgb(255, 120, 100)'; color2Bottom = 'rgb(255, 180, 150)';
        }
        
        const localT = (progress - t1) / (t2 - t1);
        return {
            top: interpolateColor(color1Top, color2Top, localT),
            bottom: interpolateColor(color1Bottom, color2Bottom, localT)
        };
    }
    
    function isEveningOrNight(progress) {
        return progress >= 0.5;
    }
    
    function drawSun(x, y) {
        ctx.shadowBlur = 25;
        ctx.shadowColor = '#FFD700';
        for(let i = 0; i < 12; i++) {
            const angle = i * Math.PI * 2 / 12;
            const dx = Math.cos(angle) * 32;
            const dy = Math.sin(angle) * 32;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + dx, y + dy);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#FFD700';
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(x, y, 28, 0, Math.PI * 2);
        ctx.fillStyle = '#FFD700';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x - 7, y - 7, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#FFF8DC';
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    function drawMoon(x, y) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#C0C0C0';
        ctx.beginPath();
        ctx.arc(x, y, 26, 0, Math.PI * 2);
        ctx.fillStyle = '#F5F5DC';
        ctx.fill();
        ctx.fillStyle = '#B0B0B0';
        ctx.beginPath();
        ctx.arc(x - 8, y - 5, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 6, y + 3, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x - 2, y + 7, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 10, y - 4, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    function drawSunAndMoon(progress) {
        const centerX = canvas.width / 2;
        const centerY = canvas.height + 50;
        const radius = 300;
        
        const angle = progress * Math.PI * 2;
        
        // Меняем местами: солнце по нижней дуге, луна по верхней
        let sunAngle = angle + Math.PI;
        let moonAngle = angle;
        
        let sunX = centerX + Math.cos(sunAngle) * radius;
        let sunY = centerY + Math.sin(sunAngle) * radius;
        let moonX = centerX + Math.cos(moonAngle) * radius;
        let moonY = centerY + Math.sin(moonAngle) * radius;
        
        if(sunY < canvas.height + 100 && sunY > -100) drawSun(sunX, sunY);
        if(moonY < canvas.height + 100 && moonY > -100) drawMoon(moonX, moonY);
    }
    
    function createObstacle() {
        if(!gameActive || gameEnded) return;
        const type = crossTypes[Math.floor(Math.random() * crossTypes.length)];
        obstacles.push({ 
            x: canvas.width, 
            y: groundY - 20,
            width: type.width, 
            height: type.height,
            visualY: type.visualY,
            type: type.name
        });
    }
    
    function createItem() {
        if(!gameActive || gameEnded) return;
        items.push({ x: canvas.width, y: groundY - 48, width: 28, height: 28 });
    }
    
    function addParticle(x, y) {
        particles.push({ x: x, y: y, life: 1, size: 4 });
    }
    
    function drawPixelatedHelloKitty(x, y) {
        const kx = Math.floor(x);
        const ky = Math.floor(y);
        
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(kx + 10, ky + 15, 25, 35);
        ctx.fillRect(kx + 8, ky + 5, 29, 30);
        ctx.fillRect(kx + 5, ky - 2, 8, 12);
        ctx.fillRect(kx + 32, ky - 2, 8, 12);
        
        ctx.fillStyle = '#FF1493';
        ctx.fillRect(kx + 18, ky + 3, 9, 6);
        ctx.fillRect(kx + 14, ky + 5, 6, 4);
        ctx.fillRect(kx + 25, ky + 5, 6, 4);
        
        ctx.fillStyle = '#000000';
        ctx.fillRect(kx + 15, ky + 14, 4, 4);
        ctx.fillRect(kx + 26, ky + 14, 4, 4);
        
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(kx + 21, ky + 19, 3, 3);
        
        ctx.fillStyle = '#000000';
        ctx.fillRect(kx + 4, ky + 18, 8, 2);
        ctx.fillRect(kx + 33, ky + 18, 8, 2);
        ctx.fillRect(kx + 4, ky + 23, 7, 2);
        ctx.fillRect(kx + 34, ky + 23, 7, 2);
        
        ctx.fillStyle = '#FF1493';
        ctx.fillRect(kx + 38, ky + 30, 8, 6);
        ctx.fillRect(kx + 36, ky + 32, 5, 4);
        ctx.fillRect(kx + 43, ky + 32, 5, 4);
    }
    
    function drawBuilding(b, x, isEvening) {
        const buildingColors = ['#5C5C5C', '#6B6B6B', '#4A4A4A', '#7A7A7A', '#3D3D3D'];
        const colorIndex = Math.abs(Math.floor(x / 10)) % buildingColors.length;
        
        ctx.fillStyle = buildingColors[colorIndex];
        ctx.fillRect(x, groundY - b.height - 10, b.width, b.height);
        
        ctx.fillStyle = '#3A3A3A';
        const sections = [5, 22, 39];
        for(let s of sections) {
            ctx.fillRect(x + s, groundY - b.height - 8, 10, b.height - 4);
        }
        
        if(isEvening) {
            ctx.fillStyle = '#FFD700';
        } else {
            ctx.fillStyle = '#2A2A2A';
        }
        
        let windowIdx = 0;
        for(let floor = 0; floor < 4; floor++) {
            for(let s = 0; s < 3; s++) {
                const sectionX = x + 5 + s * 17;
                const windowY = groundY - b.height - 5 + floor * 14;
                
                if(isEvening) {
                    if(b.windowsLit && b.windowsLit[windowIdx]) {
                        ctx.fillStyle = '#FFD700';
                        ctx.fillRect(sectionX + 2, windowY, 5, 6);
                        ctx.fillStyle = '#FFA500';
                        ctx.fillRect(sectionX + 3, windowY + 1, 3, 4);
                        ctx.fillStyle = '#FFD700';
                    }
                } else {
                    ctx.fillRect(sectionX + 2, windowY, 5, 6);
                }
                windowIdx++;
            }
        }
    }
    
    function drawChurch(x, isEvening) {
        const churchHeight = 35;
        const churchWidth = 40;
        
        ctx.fillStyle = '#C4A882';
        ctx.fillRect(x, groundY - churchHeight - 10, churchWidth, churchHeight);
        ctx.fillStyle = '#B8956E';
        ctx.fillRect(x + 5, groundY - churchHeight + 5, churchWidth - 10, churchHeight - 15);
        
        ctx.fillStyle = isEvening ? '#FFD700' : '#2A2A2A';
        ctx.fillRect(x + 10, groundY - churchHeight + 10, 6, 8);
        ctx.fillRect(x + 24, groundY - churchHeight + 10, 6, 8);
        
        ctx.fillStyle = '#6B4226';
        ctx.fillRect(x + 17, groundY - churchHeight + 20, 6, 10);
        
        ctx.fillStyle = '#C4A882';
        ctx.beginPath();
        ctx.ellipse(x + 20, groundY - churchHeight - 5, 12, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(x + 18, groundY - churchHeight - 18, 4, 14);
        ctx.fillRect(x + 12, groundY - churchHeight - 12, 16, 4);
    }
    
    function drawBackground() {
        const progress = getCyclicProgress();
        const isEvening = isEveningOrNight(progress);
        
        if(gameActive && !gameEnded) {
            const speed = getCurrentSpeed();
            for(let i = 0; i < backgroundElements.length; i++) {
                backgroundElements[i].x -= speed * 0.35;
            }
            
            backgroundElements = backgroundElements.filter(el => el.x + el.width > -60);
            
            if(backgroundElements.length === 0 || backgroundElements[backgroundElements.length - 1].x < canvas.width - 130) {
                const isChurch = Math.random() < 0.04;
                backgroundElements.push(createBuilding(canvas.width + 30, isChurch));
            }
        }
        
        for(let el of backgroundElements) {
            if(el.type === 'church') {
                drawChurch(el.x, isEvening);
            } else {
                drawBuilding(el, el.x, isEvening);
            }
        }
    }
    
    function drawObstacles() {
        for(let obs of obstacles) {
            const cx = obs.x + obs.width/2;
            const cy = obs.visualY + obs.height/2;
            
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(cx - 12, cy - 3, 24, 6);
            ctx.fillRect(cx - 3, cy - 12, 6, 24);
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(cx - 10, cy - 2, 20, 4);
            ctx.fillRect(cx - 2, cy - 10, 4, 20);
            
            if(obs.type === 'double') {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(cx - 20, cy - 3, 40, 6);
                ctx.fillRect(cx - 3, cy - 20, 6, 40);
                ctx.fillStyle = '#000000';
                ctx.fillRect(cx - 18, cy - 2, 36, 4);
                ctx.fillRect(cx - 2, cy - 18, 4, 36);
            }
            
            if(obs.type === 'big') {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(cx - 16, cy - 4, 32, 8);
                ctx.fillRect(cx - 4, cy - 16, 8, 32);
                ctx.fillStyle = '#000000';
                ctx.fillRect(cx - 14, cy - 3, 28, 6);
                ctx.fillRect(cx - 3, cy - 14, 6, 28);
            }
        }
    }
    
    function endGame(isWin = false) {
        if(gameEnded) return;
        gameEnded = true;
        gameActive = false;
        stopMusic();
        
        document.getElementById('finalScore').innerText = score;
        const endCard = document.getElementById('endCard');
        
        if(isWin) {
            endCard.querySelector('h1').innerHTML = '🎀 ПОБЕДА! 🎀';
        } else {
            endCard.querySelector('h1').innerHTML = '🎀 ИГРА ОКОНЧЕНА 🎀';
        }
        
        canvas.style.filter = 'blur(4px)';
        endCard.style.display = 'flex';
    }
    
    function update() {
        if(!gameActive || gameEnded) return;
        
        gameSpeed = getCurrentSpeed();
        
        player.velocityY += gravity;
        player.y += player.velocityY;
        if(player.y >= groundY - player.height) {
            player.y = groundY - player.height;
            player.isJumping = false;
            player.velocityY = 0;
        }
        if(player.y < 0) { player.y = 0; player.velocityY = 0; }
        
        for(let obs of obstacles) obs.x -= gameSpeed;
        for(let item of items) item.x -= gameSpeed;
        obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
        items = items.filter(item => item.x + item.width > 0);
        
        for(let obs of obstacles) {
            if(player.x < obs.x + obs.width &&
               player.x + player.width > obs.x &&
               player.y + player.height - 10 < obs.y + obs.height &&
               player.y + player.height > obs.y) {
                endGame(false);
                return;
            }
        }
        
        for(let i = 0; i < items.length; i++) {
            const item = items[i];
            if(player.x < item.x + item.width && player.x + player.width > item.x &&
               player.y < item.y + item.height && player.y + player.height > item.y) {
                items.splice(i, 1);
                score++;
                document.getElementById('score').innerText = `🎀 ${score}`;
                addParticle(player.x + player.width/2, player.y + player.height/2);
                i--;
            }
        }
        
        particles = particles.filter(p => {
            p.life -= 0.03;
            p.y -= 1;
            return p.life > 0;
        });
        
        if(!firstSpawnDone) {
            if(spawnDelay > 0) {
                spawnDelay--;
            } else {
                firstSpawnDone = true;
            }
        }
        
        if(firstSpawnDone) {
            spawnCounter++;
            if(spawnCounter > 40) {
                spawnCounter = 0;
                if(Math.random() < 0.45) createObstacle();
                else createItem();
            }
        }
        
        frame++;
        
        if(Date.now() - gameStartTime >= gameDuration && !gameEnded) {
            endGame(true);
        }
    }
    
    function drawGround() {
        ctx.fillStyle = '#8B5A2B';
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        ctx.fillStyle = '#A06E3A';
        ctx.fillRect(0, groundY - 8, canvas.width, 8);
        ctx.fillStyle = '#5C9E3A';
        for(let i = 0; i < canvas.width; i += 16) {
            ctx.fillRect(i - frame % 16, groundY - 12, 6, 8);
            ctx.fillRect(i + 6 - frame % 16, groundY - 16, 4, 10);
        }
    }
    
    function drawItems() {
        for(let item of items) {
            ctx.font = '28px monospace';
            ctx.fillStyle = '#FF69B4';
            ctx.fillText('🎀', item.x, item.y + 22);
        }
    }
    
    function drawClouds(progress) {
        ctx.fillStyle = `rgba(255,255,255,${0.15 + Math.sin(progress * Math.PI) * 0.1})`;
        for(let i = 0; i < 3; i++) {
            const cloudX = (i * 150 + frame * 0.15) % (canvas.width + 100) - 50;
            const cloudY = 40 + i * 30;
            ctx.fillRect(cloudX, cloudY, 55, 20);
            ctx.fillRect(cloudX + 22, cloudY - 10, 42, 18);
            ctx.fillRect(cloudX - 12, cloudY + 5, 38, 15);
        }
    }
    
    function drawParticles() {
        for(let p of particles) {
            ctx.fillStyle = `rgba(255, 105, 180, ${p.life})`;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        }
    }
    
    function draw() {
        const progress = getCyclicProgress();
        const sky = getSkyGradient(progress);
        
        const grad = ctx.createLinearGradient(0, 0, 0, groundY);
        grad.addColorStop(0, sky.top);
        grad.addColorStop(1, sky.bottom);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, groundY);
        
        drawSunAndMoon(progress);
        drawBackground();
        drawClouds(progress);
        drawGround();
        drawObstacles();
        drawItems();
        
        ctx.save();
        if(player.isJumping) ctx.translate(0, -5);
        drawPixelatedHelloKitty(player.x, player.y);
        ctx.restore();
        
        drawParticles();
        
        if(gameActive && !gameEnded) {
            const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
            document.getElementById('timer').innerText = `⏱ ${Math.max(0, 60 - elapsed)}`;
        }
    }
    
    function jump() {
        if(!gameActive || gameEnded) return;
        if(!player.isJumping) {
            player.velocityY = jumpPower;
            player.isJumping = true;
        }
    }
    
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    canvas.addEventListener('mousedown', () => { onFirstTap(); jump(); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onFirstTap(); jump(); });
    
    initBackground();
    gameLoop();
</script>
</body>
</html>
